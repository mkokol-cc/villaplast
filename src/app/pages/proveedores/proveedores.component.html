<div class="proveedores-container p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-6 fw-bold m-0">Gestión de Proveedores</h1>
    <div class="d-flex gap-2">
      <button mat-stroked-button color="primary" (click)="verHistorial(null)">
        <mat-icon>print</mat-icon> Imprimir Estados
      </button>
      <!--button mat-stroked-button color="primary" (click)="verHistorial(null)">
        <mat-icon>history</mat-icon> Historial Completo
      </button-->
      <button mat-flat-button color="primary" (click)="openNewProveedor()">
        <mat-icon>add</mat-icon> Nuevo Proveedor
      </button>
    </div>
  </div>

  <div class="header-section mb-4">
    <mat-card class="filter-card border">
      <mat-card-content class="pt-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
          <div class="flex-grow-1 no-subscript">
            <app-buscador-proveedor [proveedores]="proveedoresMock" (proveedorSelected)="onProveedorSelected($event)" (proveedorCreated)="onProveedorCreated($event)"></app-buscador-proveedor>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="mat-elevation-z4 table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="razonSocial">
              <th mat-header-cell *matHeaderCellDef> Razón Social </th>
              <td mat-cell *matCellDef="let p" class="fw-bold"> {{p.razonSocial}} </td>
            </ng-container>

            <ng-container matColumnDef="cuit">
              <th mat-header-cell *matHeaderCellDef> CUIT </th>
              <td mat-cell *matCellDef="let p" class="text-muted"> {{p.cuit}} </td>
            </ng-container>

            <ng-container matColumnDef="telefono">
              <th mat-header-cell *matHeaderCellDef> Teléfono </th>
              <td mat-cell *matCellDef="let p"> {{p.telefono || '-'}} </td>
            </ng-container>

            <ng-container matColumnDef="saldo">
              <th mat-header-cell *matHeaderCellDef> Saldo Pend. </th>
              <td mat-cell *matCellDef="let p" class="text-danger fw-bold"> $0.00 </td>
            </ng-container>

            <ng-container matColumnDef="ultimaCompra">
              <th mat-header-cell *matHeaderCellDef> Última Compra </th>
              <td mat-cell *matCellDef="let p"> {{p.ultimaCompra | date:'dd/MM/yy'}} </td>
            </ng-container>

            <ng-container matColumnDef="acciones">
              <th mat-header-cell *matHeaderCellDef> Acciones </th>
              <td mat-cell *matCellDef="let p" class="text-end">
                <div class="d-flex">
                  <button mat-icon-button matTooltip="Movimientos"><mat-icon>history</mat-icon></button>
                  <button mat-icon-button (click)="selectProveedor(p)" matTooltip="Ver detalle"><mat-icon>visibility</mat-icon></button>
                  <button mat-icon-button matTooltip="Editar" (click)="editProveedor(p, $event)">
                    <mat-icon>edit</mat-icon>
                  </button>
                  <!--button mat-icon-button [matTooltip]="p.activo ? 'Desactivar' : 'Activar'" (click)="toggleProveedorStatus(p, $event)">
                    <mat-icon [color]="p.activo ? 'warn' : 'primary'">{{p.activo ? 'block' : 'check_circle'}}</mat-icon>
                  </button-->
                  <button mat-icon-button matTooltip="Eliminar" color="warn"><mat-icon>delete</mat-icon></button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            <!--tr mat-row *matRowDef="let row; columns: displayedColumns;" 
                (click)="selectProveedor(row)" 
                class="clickable-row"
                [ngClass]="{'opacity-50': !row.activo}"></tr-->
          </table>
  </div>
</div>
