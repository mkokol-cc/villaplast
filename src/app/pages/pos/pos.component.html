<div class="pos-wrapper container-fluid h-100 py-3">
  <div class="row h-100 g-4">
    
    <!-- COLUMNA IZQUIERDA: BUSCADOR Y CATALOGO -->
    <div class="col-md-8 d-flex flex-column h-100">
      
      <!-- Buscador reutilizable -->
      <div class="search-box mb-4">
        <app-buscador-producto [products]="products" (productSelected)="addToCart($event)" (productCreated)="onProductCreated($event)"></app-buscador-producto>
      </div>

      <!-- Catálogo Minimalista -->
      <div class="catalog-grid flex-fill overflow-auto">
        <div class="row row-cols-2 row-cols-lg-5 g-3 mx-0 px-0 pb-1">
          <div class="col" *ngFor="let product of products">
            <div class="product-card card h-100 shadow-sm border-0" (click)="addToCart(product)">
              <div class="img-container p-3 text-center">
                <img [src]="product.imagenUrl" [alt]="product.descripcion" class="img-fluid" *ngIf="product.imagenUrl">
              </div>
              <div class="card-body text-center p-2">
                <div class="product-name text-truncate">{{product.descripcion}}</div>
                <div class="product-price fw-bold text-primary">${{product.precioVenta}}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- COLUMNA DERECHA: TICKET / DETALLE -->
    <div class="col-md-4 h-100">
      <div class="ticket-card card h-100 shadow border-0">
        <div class="card-header py-3 border-bottom bg-custom-secondary">
          <h3 class="mb-0 fw-bold d-flex align-items-center">
            <mat-icon class="me-2 text-primary">receipt_long</mat-icon> Detalle de Compra
          </h3>
        </div>
        
        <div class="card-body overflow-auto flex-grow-1 p-0">
          <app-lista-productos [cart]="cart" (changeQuantity)="handleChangeQuantity($event)"></app-lista-productos>
        </div>

        <div class="card-footer bg-custom-secondary p-4 border-0">
          <div class="d-flex justify-content-between mb-4 mt-2">
            <span class="fs-3 fw-light">TOTAL</span>
            <span class="fs-1 fw-bold text-success">${{getTotal()}}</span>
          </div>
          <button mat-flat-button color="primary" class="w-100 py-4 fs-2 rounded-3 shadow" [disabled]="cart.length === 0">COBRAR</button>
        </div>
      </div>
    </div>
  </div>
</div>
