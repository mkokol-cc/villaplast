<div class="clientes-container p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-6 fw-bold m-0">Gestión de Clientes</h1>
    <div class="d-flex gap-2">
      <button mat-stroked-button color="primary" (click)="imprimirEstadoCuenta()">
        <mat-icon>print</mat-icon> Imprimir Estados
      </button>
      <button mat-flat-button color="primary" (click)="nuevoCliente()">
        <mat-icon>person_add</mat-icon> Nuevo Cliente
      </button>
    </div>
  </div>

  <div class="header-section mb-4">
    <mat-card class="filter-card shadow-sm border-0">
      <mat-card-content class="pt-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
          <mat-form-field appearance="outline" class="flex-grow-1 no-subscript">
            <mat-label>Buscar por nombre, CUIT/DNI o teléfono...</mat-label>
            <input matInput [formControl]="searchControl">
            <mat-icon matPrefix class="me-2">search</mat-icon>
            <button *ngIf="searchControl.value" matSuffix mat-icon-button (click)="searchControl.setValue('')">
              <mat-icon>close</mat-icon>
            </button>
          </mat-form-field>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="row g-4">
    <!-- SECTOR LISTADO (siempre ocupa 12 columnas ahora) -->
    <div class="col-md-12 transition-all">
      <mat-card class="shadow-sm border-0 h-100">
        <mat-card-content class="p-0">          
          <div class="p-3 d-flex justify-content-end">
            <!-- Espacio para futuros filtros específicos de la tabla si fueran necesarios -->
          </div>

          <table mat-table [dataSource]="dataSource" class="w-100">
            <ng-container matColumnDef="razonSocial">
              <th mat-header-cell *matHeaderCellDef> Cliente </th>
              <td mat-cell *matCellDef="let c" class="fw-bold"> {{c.razonSocial}} </td>
            </ng-container>

            <ng-container matColumnDef="cuitDni">
              <th mat-header-cell *matHeaderCellDef> CUIT/DNI </th>
              <td mat-cell *matCellDef="let c" class="text-muted"> {{c.cuitDni}} </td>
            </ng-container>

            <ng-container matColumnDef="telefono">
              <th mat-header-cell *matHeaderCellDef> Teléfono </th>
              <td mat-cell *matCellDef="let c"> {{c.telefono || '-'}} </td>
            </ng-container>

            <ng-container matColumnDef="saldo">
              <th mat-header-cell *matHeaderCellDef> Saldo CC </th>
              <td mat-cell *matCellDef="let c" class="fw-bold" [ngClass]="c.activo ? 'text-primary' : 'text-muted'"> $0.00 </td>
            </ng-container>

            <ng-container matColumnDef="ultimaCompra">
              <th mat-header-cell *matHeaderCellDef> Úm. Compra </th>
              <td mat-cell *matCellDef="let c"> {{c.ultimaCompra | date:'dd/MM/yy' || '-'}} </td>
            </ng-container>

            <ng-container matColumnDef="acciones">
              <th mat-header-cell *matHeaderCellDef> </th>
              <td mat-cell *matCellDef="let c" class="text-end">
                <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                  <button mat-menu-item (click)="editarCliente(c, $event)"><mat-icon>edit</mat-icon>Editar</button>
                  <button mat-menu-item (click)="toggleActivo(c, $event)">
                    <mat-icon [color]="c.activo ? 'warn' : 'primary'">{{c.activo ? 'block' : 'check_circle'}}</mat-icon>
                    {{c.activo ? 'Desactivar' : 'Activar'}}
                  </button>
                  <mat-divider></mat-divider>
                  <button mat-menu-item (click)="registrarCobro(c)"><mat-icon>payments</mat-icon>Registrar Cobro</button>
                  <button mat-menu-item><mat-icon>account_balance_wallet</mat-icon>Ver Cuenta Corriente</button>
                  <button mat-menu-item><mat-icon>history</mat-icon>Ver Historial</button>
                </mat-menu>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" 
                (click)="selectCliente(row)" 
                class="clickable-row"
                [ngClass]="{'opacity-50': !row.activo}"></tr>
          </table>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
