<div class="clientes-container p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-6 fw-bold m-0">Gestión de Clientes</h1>
    <div class="d-flex gap-2">
      <button mat-stroked-button color="primary" (click)="imprimirEstadoCuenta()">
        <mat-icon>print</mat-icon> Imprimir Estados
      </button>
      <button mat-flat-button color="primary" (click)="nuevoCliente()">
        <mat-icon>person_add</mat-icon> Nuevo Cliente
      </button>
    </div>
  </div>

  <div class="header-section mb-4">
    <mat-card class="filter-card border">
      <mat-card-content class="pt-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
          <div class="flex-grow-1 no-subscript">
            <app-buscador-cliente [clientes]="clientesMock" (clienteSelected)="selectCliente($event)" (clienteCreated)="onClienteCreated($event)"></app-buscador-cliente>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>


  <div class="mat-elevation-z4 table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="razonSocial">
              <th mat-header-cell *matHeaderCellDef> Cliente </th>
              <td mat-cell *matCellDef="let c" class="fw-bold"> {{c.razonSocial}} </td>
            </ng-container>

            <ng-container matColumnDef="cuitDni">
              <th mat-header-cell *matHeaderCellDef> CUIT/DNI </th>
              <td mat-cell *matCellDef="let c" class="text-muted"> {{c.cuitDni}} </td>
            </ng-container>

            <ng-container matColumnDef="telefono">
              <th mat-header-cell *matHeaderCellDef> Teléfono </th>
              <td mat-cell *matCellDef="let c"> {{c.telefono || '-'}} </td>
            </ng-container>

            <ng-container matColumnDef="saldo">
              <th mat-header-cell *matHeaderCellDef> Saldo CC </th>
              <td mat-cell *matCellDef="let c" class="fw-bold text-primary"> $0.00 </td><!--[ngClass]="c.activo ? 'text-primary' : 'text-muted'"-->
            </ng-container>

            <ng-container matColumnDef="ultimaCompra">
              <th mat-header-cell *matHeaderCellDef> Úm. Compra </th>
              <td mat-cell *matCellDef="let c"> {{c.ultimaCompra | date:'dd/MM/yy' || '-'}} </td>
            </ng-container>

            <ng-container matColumnDef="acciones">
              <th mat-header-cell *matHeaderCellDef>Acciones</th>
              <td mat-cell *matCellDef="let c" class="text-end">
                <div class="d-flex">
                  <button mat-icon-button matTooltip="Movimientos"><mat-icon>history</mat-icon></button>
                  <button mat-icon-button (click)="selectCliente(c)" matTooltip="Ver detalle"><mat-icon>visibility</mat-icon></button>
                  <button mat-icon-button matTooltip="Editar" (click)="editarCliente(c, $event)">
                    <mat-icon>edit</mat-icon>
                  </button>
                  <!--button mat-icon-button [matTooltip]="p.activo ? 'Desactivar' : 'Activar'" (click)="toggleProveedorStatus(p, $event)">
                    <mat-icon [color]="p.activo ? 'warn' : 'primary'">{{p.activo ? 'block' : 'check_circle'}}</mat-icon>
                  </button-->
                  <!--button mat-menu-item (click)="registrarCobro(c)"><mat-icon>payments</mat-icon>Registrar Cobro</button-->
                  <button mat-icon-button matTooltip="Eliminar" color="warn"><mat-icon>delete</mat-icon></button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            <!--tr mat-row *matRowDef="let row; columns: displayedColumns;" 
                (click)="selectCliente(row)" 
                class="clickable-row"
                [ngClass]="{'opacity-50': !row.activo}"></tr-->
          </table>

  </div>
</div>
