<h2 mat-dialog-title>{{ isEditing ? 'Editar Producto' : 'Cargar Nuevo Producto' }}</h2>
<mat-dialog-content class="pt-3">
  <form [formGroup]="productForm">
    <div class="row">
      <!-- Sección Imagen -->
      <div class="col-md-3 text-center mb-3">
        <div class="image-preview-container border rounded mb-2 d-flex align-items-center justify-content-center bg-light" style="height: 180px; overflow: hidden;">
          <img *ngIf="productForm.get('imagenUrl')?.value" [src]="productForm.get('imagenUrl')?.value" class="img-fluid rounded" style="max-height: 100%; object-fit: contain;">
          <mat-icon *ngIf="!productForm.get('imagenUrl')?.value" class="text-muted" style="font-size: 48px; height: 48px; width: 48px;">image</mat-icon>
        </div>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>URL Imagen</mat-label>
          <input matInput formControlName="imagenUrl" placeholder="http://...">
        </mat-form-field>
      </div>

      <!-- Sección Datos -->
      <div class="col-md-9">
        <h3 class="text-primary mb-3">Información General</h3>
        <div class="row">
          <mat-form-field appearance="outline" class="col-md-4">
            <mat-label>Código Interno</mat-label>
            <input matInput formControlName="codigoInterno">
            <mat-error>Requerido</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="col-md-4">
            <mat-label>Código de Barras</mat-label>
            <input matInput formControlName="codigoBarra">
          </mat-form-field>
          <mat-form-field appearance="outline" class="col-md-4">
            <mat-label>Categoría</mat-label>
            <input matInput formControlName="categoria">
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Descripción</mat-label>
          <input matInput formControlName="descripcion">
          <mat-error>Mínimo 3 caracteres</mat-error>
        </mat-form-field>

        <mat-divider class="my-3"></mat-divider>
        
        <h3 class="text-primary mb-3">Valores Comerciales y Stock</h3>
        <div class="row">
          <mat-form-field appearance="outline" class="col-md-3">
            <mat-label>Precio Costo</mat-label>
            <input matInput type="number" formControlName="precioCosto">
            <span matPrefix>$&nbsp;</span>
          </mat-form-field>
          <mat-form-field appearance="outline" class="col-md-3">
            <mat-label>Precio Venta</mat-label>
            <input matInput type="number" formControlName="precioVenta">
            <span matPrefix>$&nbsp;</span>
          </mat-form-field>
          <mat-form-field appearance="outline" class="col-md-3">
            <mat-label>Stock Mínimo</mat-label>
            <input matInput type="number" formControlName="stockMinimo">
          </mat-form-field>
          <mat-form-field appearance="outline" class="col-md-3">
            <mat-label>Proveedor Habitual</mat-label>
            <input matInput formControlName="proveedorNombre">
          </mat-form-field>
        </div>

        <div class="mt-2">
          <mat-checkbox formControlName="activo">Producto Activo</mat-checkbox>
        </div>
      </div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="p-3">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="saveProduct()" [disabled]="productForm.invalid">
    Guardar Cambios
  </button>
</mat-dialog-actions>
