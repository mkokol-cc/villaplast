<h2 mat-dialog-title>{{ isEditing ? 'Editar Proveedor' : 'Nuevo Proveedor' }}</h2>
<mat-dialog-content class="pt-3">
	<form [formGroup]="providerForm">
		<div class="row">
			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Razón Social</mat-label>
				<input matInput formControlName="razonSocial">
				<mat-error *ngIf="providerForm.get('razonSocial')?.invalid">Requerido (mín 3 caracteres)</mat-error>
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>CUIT</mat-label>
				<input matInput formControlName="cuit">
				<mat-error *ngIf="providerForm.get('cuit')?.invalid">CUIT requerido</mat-error>
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Teléfono</mat-label>
				<input matInput formControlName="telefono">
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Dirección</mat-label>
				<input matInput formControlName="direccion">
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-12">
				<mat-label>Observaciones</mat-label>
				<textarea matInput formControlName="observaciones" rows="3"></textarea>
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6 d-none">
				<mat-label>Última Compra</mat-label>
				<input matInput [matDatepicker]="picker" formControlName="ultimaCompra">
				<mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
				<mat-datepicker #picker></mat-datepicker>
			</mat-form-field>

			<div class="col-md-6 d-flex align-items-center">
				<mat-checkbox formControlName="activo">Activo</mat-checkbox>
			</div>
		</div>
	</form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="p-3">
	<button mat-stroked-button color="warn" (click)="cancel()">Cancelar</button>
	<button mat-flat-button color="primary" (click)="saveProveedor()" [disabled]="providerForm.invalid">Guardar</button>
</mat-dialog-actions>
