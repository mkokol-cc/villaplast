<mat-form-field appearance="outline" class="w-100 large-input buscador-producto">
	<mat-label>Cliente</mat-label>
	<input type="text" matInput [formControl]="searchControl" [matAutocomplete]="auto" [value]="''" [attr.autocomplete]="'off'">
	<button mat-icon-button matSuffix type="button" title="Nuevo cliente" (click)="openNewCliente($event)">
		<mat-icon>add</mat-icon>
	</button>

	<mat-autocomplete #auto="matAutocomplete" (optionSelected)="onOptionSelected($event.option.value)" [displayWith]="displayFn.bind(this)">
		<mat-option *ngFor="let cli of filteredClientes | async" [value]="cli">
			<div class="d-flex align-items-center py-1">
				<div class="flex-grow-1">
					<div class="fw-bold">{{cli.razonSocial}}</div>
					<small class="text-muted">CUIT/DNI: {{cli.cuitDni || '—'}} • Tel: {{cli.telefono || '—'}}</small>
				</div>
			</div>
		</mat-option>
	</mat-autocomplete>
</mat-form-field>
