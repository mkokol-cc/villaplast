<h2 mat-dialog-title>{{ isEditing ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>
<mat-dialog-content class="pt-3">
	<form [formGroup]="clientForm">
		<div class="row">
			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Razón Social</mat-label>
				<input matInput formControlName="razonSocial">
				<mat-error *ngIf="clientForm.get('razonSocial')?.invalid">Requerido (mín 3 caracteres)</mat-error>
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>CUIT / DNI</mat-label>
				<input matInput formControlName="cuitDni">
				<mat-error *ngIf="clientForm.get('cuitDni')?.invalid">CUIT/DNI requerido</mat-error>
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Teléfono</mat-label>
				<input matInput formControlName="telefono">
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Dirección</mat-label>
				<input matInput formControlName="direccion">
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-12">
				<mat-label>Observaciones</mat-label>
				<textarea matInput formControlName="observaciones" rows="3"></textarea>
			</mat-form-field>

			<mat-form-field appearance="outline" class="col-md-6">
				<mat-label>Última Compra</mat-label>
				<input matInput [matDatepicker]="picker" formControlName="ultimaCompra">
				<mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
				<mat-datepicker #picker></mat-datepicker>
			</mat-form-field>

			<div class="col-md-6 d-flex align-items-center">
				<mat-checkbox formControlName="activo">Activo</mat-checkbox>
			</div>
		</div>
	</form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="p-3">
	<button mat-stroked-button color="warn" (click)="cancel()">Cancelar</button>
	<button mat-flat-button color="primary" (click)="saveCliente()" [disabled]="clientForm.invalid">Guardar</button>
</mat-dialog-actions>
